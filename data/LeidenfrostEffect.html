        <h1><center>Leidenfrost Effect (ライデンフロスト現象)</center></h1>

<p>
熱したフライパンに水を落としたとき、水滴が玉のようになってコロコロ転がる現象
</p>

<h3>なぜ起こるのか?</h3>

<p>
液体の沸点よりもはるかに高温な固体表面に液体を落とした際、液体の底部が瞬時に蒸発して薄い蒸気の層（蒸気膜）ができ、液体が表面から浮き上がる。<br>
<br>
固体と液体の間に形成された蒸気膜が「断熱材」のような役割を果たす。これにより、熱が液体内部へ伝わりにくくなるため、液体はすぐに蒸発せず、長い間その場に留まり続ける。<br>
<br>
液体は蒸気のクッションに乗った状態になるため、表面との摩擦が極めて小さくなり、球状を保ったまま滑るように激しく動き回る。
</p>
